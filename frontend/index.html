<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合肥拓图俄罗斯销售分析系统</title>
  <link rel="icon" type="image/png" href="/api/admin/favicon/">
  <script>
    // Preload UI settings synchronously before Vue mounts to prevent flicker
    (function() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/admin/ui-settings/', false);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            localStorage.setItem('ui_settings_cache', JSON.stringify(data));
            if (data.system_name) document.title = data.system_name;
          } catch(e) {}
        }
      };
      try { xhr.send(null); } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
